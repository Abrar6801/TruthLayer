name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type-check (mypy)
        run: mypy

      - name: Tests (pytest)
        # Tests are fully mocked — no API keys are configured in CI, and no
        # secrets should ever be added to this workflow for them.
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Build (next build)
        # Catches what tsc alone can't: broken imports, invalid route
        # exports, and server/client component violations.
        run: npm run build

  deploy:
    # Continuous deployment: merges to main that pass both check jobs ship
    # to Cloud Run automatically. Auth is keyless — GitHub's OIDC token is
    # exchanged for GCP credentials via Workload Identity Federation, whose
    # provider is attribute-locked to this repository, so there is no
    # long-lived service-account key to leak or rotate.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [checks, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required to mint the OIDC token for WIF
    env:
      IMAGE: us-central1-docker.pkg.dev/truthlayer-prod/cloud-run-source-deploy/truthlayer-api:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          # Not a secret: a public resource path, safe to commit (the provider
          # itself only trusts OIDC tokens from this exact repository).
          workload_identity_provider: projects/760747555557/locations/global/workloadIdentityPools/github/providers/github-oidc # pragma: allowlist secret
          service_account: github-deployer@truthlayer-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        # Only --image is specified: the revision keeps the service's
        # existing env vars, secrets, and scaling settings (set at launch,
        # see DEPLOYMENT.md) rather than restating them here.
        run: |
          gcloud run deploy truthlayer-api \
            --image "$IMAGE" \
            --region us-central1 \
            --quiet
