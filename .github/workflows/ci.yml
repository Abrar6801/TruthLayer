name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type-check (mypy)
        run: mypy

      - name: Tests (pytest)
        # Tests are fully mocked — no API keys are configured in CI, and no
        # secrets should ever be added to this workflow for them.
        run: pytest
